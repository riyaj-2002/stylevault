<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customize Your Case - StyleVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    .customize-page { max-width: 1100px; margin: 0 auto; padding: 20px 40px 60px; }
    h2.section-title { text-align: center; margin-bottom: 10px; }
    .customize-subtitle {
      text-align: center;
      color: #888;
      font-size: 1rem;
      margin-bottom: 36px;
    }
    .customize-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }
    .customize-card {
      background: #fffaf4;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e8d5b8;
      box-shadow: 0 2px 12px rgba(100,50,10,0.10);
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      text-decoration: none;
    }
    .customize-card:hover { transform: translateY(-6px); box-shadow: 0 12px 36px rgba(100,50,10,0.20); }
    .customize-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .customize-card .info {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .customize-card .info h3 { font-size: 1rem; font-weight: 700; color: #282828; }
    .customize-card .info span { color: #b06633; font-size: 0.9rem; font-weight: 600; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.png" alt="StyleVault"/><span>StyleVault</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="customize.html" class="nav-active">Customize ✦</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html" class="cart-icon">🛒 <span id="cart-count">0</span></a>
    <a href="login.html" id="auth-link">Login</a>
  </div>
</nav>

<div class="customize-page">
  <h2 class="section-title">Customize Your Case</h2>
  <p class="customize-subtitle">Pick a design and personalize it with your name, initials, or a special word — made just for you.</p>
  <div class="customize-grid" id="customize-grid"></div>
</div>

<footer><p>&copy; 2026 StyleVault. All rights reserved.</p></footer>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  const customizeIds = [128, 132, 135, 136];
  const grid = document.getElementById('customize-grid');

  customizeIds.forEach(id => {
    const p = products.find(p => p.id === id);
    if (!p) return;
    const card = document.createElement('a');
    card.href = `product.html?id=${p.id}`;
    card.className = 'customize-card';
    card.innerHTML = `
      <img src="${p.image}" alt="${p.name}" onerror="this.src='images/placeholder.png'"/>
      <div class="info">
        <h3>${p.name}</h3>
        <span>Customize →</span>
      </div>
    `;
    grid.appendChild(card);
  });
</script>
<script src="js/cookies.js"></script>
<script src="js/footer.js"></script>
</body>
</html>
