<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - StyleVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    .checkout-wrap {
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px 80px;
      text-align: center;
    }
    .checkout-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 6px;
    }
    .checkout-header .underline {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      margin: 0 auto 10px;
      border-radius: 99px;
    }
    .checkout-header p {
      font-size: 0.88rem;
      color: #999;
      margin-bottom: 32px;
    }
    .amount-box {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .amount-box span { font-size: 0.9rem; color: #777; }
    .amount-box strong { font-size: 1.6rem; color: var(--primary); font-weight: 700; }
    .pay-now-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: var(--shadow-md);
    }
    .pay-now-btn:hover { background: var(--primary-dk); transform: translateY(-1px); }
    .pay-now-btn:disabled { background: #bbb; cursor: not-allowed; transform: none; }
    .secure-note {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .success-msg {
      display: none;
      background: var(--card-bg);
      border-radius: 14px;
      padding: 36px 24px;
      border: 1px solid var(--border);
      margin-top: 24px;
    }
    .success-msg h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .success-msg p { color: #777; font-size: 0.9rem; line-height: 1.6; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.png" alt="StyleVault"/><span>StyleVault</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="customize.html">Customize</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html" class="cart-icon">🛒 Cart <span id="cart-count">0</span></a>
    <a href="login.html" id="auth-link">Login</a>
  </div>
</nav>

<div class="checkout-wrap">

  <div class="checkout-header">
    <h2>Complete Payment</h2>
    <div class="underline"></div>
    <p>Secure checkout powered by Razorpay</p>
  </div>

  <div class="amount-box" id="amount-box">
    <span>Amount to Pay</span>
    <strong>₹<span id="total-amount">—</span></strong>
  </div>

  <button class="pay-now-btn" id="pay-btn" onclick="startPayment()" disabled>
    Loading...
  </button>
  <p class="secure-note">🔒 100% secure · UPI · Debit/Credit Cards</p>

  <div class="success-msg" id="success-msg">
    <h3>🎉 Order Placed!</h3>
    <p>Thank you for shopping with StyleVault.<br>A confirmation email is on its way. Redirecting...</p>
  </div>

</div>

<footer></footer>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/main.js"></script>
<script src="js/footer.js"></script>
<script src="js/cookies.js"></script>
<script>
  let RZP_KEY = '';
  let orderData = null;

  async function init() {
    const cartRes = await fetch('/api/cart', { credentials: 'include' });
    const cartData = await cartRes.json();

    if (!cartData.success || !cartData.cart.length) {
      document.getElementById('total-amount').textContent = '0';
      document.getElementById('pay-btn').textContent = 'Cart is empty';
      return;
    }

    const address = JSON.parse(localStorage.getItem('delivery_address') || '{}');
    const shipping = address.country && address.country !== 'India' ? 499 : 0;
    const subtotal = cartData.cart.reduce((s, i) => s + parseFloat(i.price) * i.quantity, 0);
    const total = (subtotal + shipping).toFixed(2);
    localStorage.setItem('cart_total', total);
    document.getElementById('total-amount').textContent = total;

    const res = await fetch('/api/razorpay/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ amount: total, shipping, address })
    });
    orderData = await res.json();

    if (!orderData.success) {
      document.getElementById('pay-btn').textContent = orderData.message || 'Failed to load. Refresh.';
      return;
    }

    RZP_KEY = orderData.key;
    const btn = document.getElementById('pay-btn');
    btn.disabled = false;
    btn.textContent = `Pay ₹${total} →`;
  }

  function showSuccess() {
    document.getElementById('amount-box').style.display = 'none';
    document.getElementById('pay-btn').style.display = 'none';
    document.querySelector('.secure-note').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
    localStorage.removeItem('cart_total');
    localStorage.removeItem('delivery_address');
    setTimeout(() => window.location.href = 'index.html', 4000);
  }

  function startPayment() {
    if (!orderData || !orderData.success) return;

    const btn = document.getElementById('pay-btn');
    btn.disabled = true;
    btn.textContent = 'Opening payment...';

    const rzp = new Razorpay({
      key: RZP_KEY,
      amount: orderData.order.amount,
      currency: 'INR',
      name: 'StyleVault',
      description: 'Phone Case Order',
      order_id: orderData.order.id,
      method: { upi: true, card: true, netbanking: false, wallet: false, emi: false },
      theme: { color: '#708090' },
      handler: async function(response) {
        const res = await fetch('/api/razorpay/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            razorpay_order_id: response.razorpay_order_id,
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_signature: response.razorpay_signature
          })
        });
        const v = await res.json();
        if (v.success) showSuccess();
        else alert('Payment verification failed. Please contact support.');
      },
      modal: {
        ondismiss: () => {
          btn.disabled = false;
          btn.textContent = `Pay ₹${document.getElementById('total-amount').textContent} →`;
        }
      }
    });

    rzp.open();
  }

  init();
</script>
</body>
</html>
