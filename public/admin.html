<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — StyleVault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Segoe UI, sans-serif; background: #f5f0eb; color: #3a2a1a; min-height: 100vh; }

    /* Login */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box {
      background: #fff; border-radius: 16px; padding: 40px 36px; width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center;
    }
    .login-box h2 { color: #5D4037; margin-bottom: 6px; font-size: 1.4rem; }
    .login-box p { color: #aaa; font-size: 0.85rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e0d6cc; border-radius: 10px;
      font-size: 0.95rem; outline: none; margin-bottom: 14px;
    }
    .login-box input:focus { border-color: #5D4037; }
    .login-box button {
      width: 100%; padding: 12px; background: #5D4037; color: #fff; border: none;
      border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .login-box button:hover { background: #7B5E52; }
    #login-err { color: #e53935; font-size: 0.82rem; margin-top: 10px; }

    /* Admin panel */
    #admin-panel { display: none; }
    .admin-header {
      background: #5D4037; color: #fff; padding: 16px 28px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .admin-header h1 { font-size: 1.2rem; }
    .admin-header button {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    }

    .admin-body { padding: 28px; max-width: 1100px; margin: 0 auto; }

    .stats { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 18px 24px; flex: 1; min-width: 140px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .label { font-size: 0.78rem; color: #aaa; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; color: #5D4037; }

    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input {
      padding: 9px 14px; border: 1.5px solid #e0d6cc; border-radius: 9px;
      font-size: 0.88rem; outline: none; background: #fff;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: #5D4037; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    th { background: #f5f0eb; padding: 13px 16px; text-align: left; font-size: 0.82rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 14px 16px; font-size: 0.9rem; border-top: 1px solid #f0ebe5; vertical-align: middle; }
    tr:hover td { background: #fdf8f4; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .badge-pending  { background: #fff3e0; color: #e65100; }
    .badge-paid     { background: #e8f5e9; color: #2e7d32; }
    .badge-shipped  { background: #e3f2fd; color: #1565c0; }
    .badge-delivered{ background: #f3e5f5; color: #6a1b9a; }

    .action-btn {
      padding: 6px 14px; border: none; border-radius: 7px; font-size: 0.8rem;
      font-weight: 600; cursor: pointer; margin-right: 6px; transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.8; }
    .btn-ship     { background: #1565c0; color: #fff; }
    .btn-deliver  { background: #6a1b9a; color: #fff; }
    .btn-items    { background: #f5f0eb; color: #5D4037; }

    .loading { text-align: center; padding: 40px; color: #aaa; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; padding: 28px; width: 480px; max-width: 95vw;
      max-height: 80vh; overflow-y: auto;
    }
    .modal h3 { color: #5D4037; margin-bottom: 16px; }
    .modal table { font-size: 0.85rem; }
    .modal-close {
      float: right; background: none; border: none; font-size: 1.2rem;
      cursor: pointer; color: #aaa; margin-top: -4px;
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h2>StyleVault Admin</h2>
    <p>Enter your admin secret to continue</p>
    <input type="password" id="secret-input" placeholder="Admin secret" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Login →</button>
    <p id="login-err"></p>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel">
  <div class="admin-header">
    <h1>StyleVault Admin</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="admin-body">
    <div class="stats" id="stats"></div>

    <div class="filter-bar">
      <select id="filter-status" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="paid">Paid</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search name / email / order ID..." oninput="renderTable()" style="flex:1;min-width:200px"/>
    </div>

    <div id="table-wrap"><p class="loading">Loading orders...</p></div>
  </div>
</div>

<!-- Items Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modal-title">Order Items</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  let secret = localStorage.getItem('sv_admin_secret') || '';
  let allOrders = [];

  if (secret) loadOrders();

  function login() {
    const val = document.getElementById('secret-input').value.trim();
    if (!val) return;
    secret = val;
    localStorage.setItem('sv_admin_secret', secret);
    loadOrders();
  }

  function logout() {
    secret = '';
    allOrders = [];
    localStorage.removeItem('sv_admin_secret');
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('secret-input').value = '';
  }

  async function loadOrders() {
    const res = await fetch('/api/orders', { headers: { 'x-admin-secret': secret } });
    if (res.status === 403) {
      document.getElementById('login-err').textContent = 'Wrong secret.';
      return;
    }
    const data = await res.json();
    allOrders = data.orders || [];
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    renderStats();
    renderTable();
  }

  function renderStats() {
    const counts = { pending: 0, paid: 0, shipped: 0, delivered: 0 };
    let revenue = 0;
    allOrders.forEach(o => {
      counts[o.status] = (counts[o.status] || 0) + 1;
      if (o.status !== 'pending') revenue += parseFloat(o.total || 0);
    });
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="label">Total Orders</div><div class="value">${allOrders.length}</div></div>
      <div class="stat-card"><div class="label">Revenue</div><div class="value">₹${revenue.toFixed(0)}</div></div>
      <div class="stat-card"><div class="label">Paid</div><div class="value" style="color:#2e7d32">${counts.paid}</div></div>
      <div class="stat-card"><div class="label">Shipped</div><div class="value" style="color:#1565c0">${counts.shipped}</div></div>
      <div class="stat-card"><div class="label">Delivered</div><div class="value" style="color:#6a1b9a">${counts.delivered}</div></div>
    `;
  }

  function renderTable() {
    const statusFilter = document.getElementById('filter-status').value;
    const search = document.getElementById('filter-search').value.toLowerCase();
    const filtered = allOrders.filter(o => {
      if (statusFilter && o.status !== statusFilter) return false;
      if (search && !`${o.id} ${o.name} ${o.email}`.toLowerCase().includes(search)) return false;
      return true;
    });

    if (!filtered.length) {
      document.getElementById('table-wrap').innerHTML = '<p class="loading">No orders found.</p>';
      return;
    }

    const rows = filtered.map(o => {
      const date = new Date(o.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      const actions = [];
      if (o.status === 'paid')     actions.push(`<button class="action-btn btn-ship"    onclick="updateStatus(${o.id},'ship')">Mark Shipped</button>`);
      if (o.status === 'shipped')  actions.push(`<button class="action-btn btn-deliver" onclick="updateStatus(${o.id},'deliver')">Mark Delivered</button>`);
      actions.push(`<button class="action-btn btn-items" onclick="viewItems(${o.id})">Items</button>`);
      return `
        <tr>
          <td><strong>#${o.id}</strong></td>
          <td>${o.name}<br><span style="color:#aaa;font-size:0.78rem">${o.email}</span></td>
          <td>₹${parseFloat(o.total).toFixed(2)}</td>
          <td>${date}</td>
          <td><span class="badge badge-${o.status}">${o.status}</span></td>
          <td>${actions.join('')}</td>
        </tr>`;
    }).join('');

    document.getElementById('table-wrap').innerHTML = `
      <table>
        <thead><tr><th>#</th><th>Customer</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function updateStatus(order_id, action) {
    const label = action === 'ship' ? 'shipped' : 'delivered';
    if (!confirm(`Mark order #${order_id} as ${label}? This will send an email to the customer.`)) return;
    const res = await fetch('/api/payment/update-status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
      body: JSON.stringify({ order_id, action })
    });
    const data = await res.json();
    if (data.success) {
      const o = allOrders.find(x => x.id === order_id);
      if (o) o.status = label;
      renderStats();
      renderTable();
    } else {
      alert('Failed: ' + (data.message || 'Unknown error'));
    }
  }

  async function viewItems(order_id) {
    const res = await fetch(`/api/orders/${order_id}/items`, { headers: { 'x-admin-secret': secret } });
    const data = await res.json();
    const rows = (data.items || []).map(i => `
      <tr>
        <td style="padding:8px 0">${i.product_name}</td>
        <td style="padding:8px 0;text-align:center">${i.quantity}</td>
        <td style="padding:8px 0;text-align:right;color:#5D4037;font-weight:600">₹${(i.price * i.quantity).toFixed(2)}</td>
      </tr>`).join('');
    document.getElementById('modal-title').textContent = `Order #${order_id} — Items`;
    document.getElementById('modal-body').innerHTML = `
      <table style="width:100%">
        <thead><tr><th style="text-align:left;padding:8px 0;color:#aaa">Item</th><th style="text-align:center;color:#aaa">Qty</th><th style="text-align:right;color:#aaa">Price</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
</script>
</body>
</html>
