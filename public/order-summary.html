<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Summary - StyleVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    .summary-page {
      max-width: 560px;
      margin: 50px auto;
      padding: 0 20px 60px;
    }
    .summary-page h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: #3a2a4a;
      margin-bottom: 24px;
      text-align: center;
    }

    .section-box {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 18px;
      box-shadow: 0 2px 12px rgba(80,40,120,0.08);
    }
    .section-box .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .section-box .section-head h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #3a2a4a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section-box .section-head a {
      font-size: 0.82rem;
      color: #9575cd;
      text-decoration: underline;
      cursor: pointer;
    }

    /* Items */
    .order-item {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f0eaf8;
    }
    .order-item:last-child { border-bottom: none; }
    .order-item img {
      width: 64px;
      height: 78px;
      object-fit: cover;
      border-radius: 10px;
      background: #f3eeff;
      flex-shrink: 0;
    }
    .order-item-info { flex: 1; }
    .order-item-info h4 { font-size: 0.92rem; color: #3a2a4a; font-weight: 600; margin-bottom: 4px; }
    .order-item-info .meta { font-size: 0.8rem; color: #999; }
    .order-item-info .item-price { font-size: 0.9rem; color: #9575cd; font-weight: 700; margin-top: 5px; }

    /* Address */
    .address-detail { font-size: 0.9rem; color: #555; line-height: 1.8; }
    .address-detail strong { color: #3a2a4a; display: block; margin-bottom: 2px; }

    /* Pricing */
    .price-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 10px;
    }
    .price-row.total {
      font-size: 1.05rem;
      font-weight: 700;
      color: #3a2a4a;
      border-top: 1px solid #e8e0f0;
      padding-top: 12px;
      margin-top: 4px;
    }
    .free-ship { color: #4caf50; font-weight: 600; }
    .paid-ship { color: #e53935; font-weight: 600; }

    .place-order-btn {
      width: 100%;
      padding: 14px;
      background: #3a2a4a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }
    .place-order-btn:hover { background: #9575cd; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.82rem;
      color: #9575cd;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.png" alt="StyleVault"/><span>StyleVault</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="customize.html">Customize ✦</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html" class="cart-icon">🛒 Cart <span id="cart-count">0</span></a>
    <a href="login.html" id="auth-link">Login</a>
  </div>
</nav>

<div class="summary-page">
  <h2>Order Summary</h2>
  <div id="summary-content"></div>
</div>

<footer><p>&copy; 2026 StyleVault. All rights reserved.</p></footer>

<script src="js/main.js"></script>
<script>
  const shippingRates = { 'India': 0, 'default': 499 };

  async function loadSummary() {
    const res = await fetch('/api/cart');
    const data = await res.json();
    const addr = JSON.parse(localStorage.getItem('delivery_address') || '{}');
    const container = document.getElementById('summary-content');

    if (!data.success || data.cart.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#aaa;padding:40px">Your cart is empty.</p>';
      return;
    }

    let subtotal = 0;
    const itemsHTML = data.cart.map(item => {
      subtotal += item.price * item.quantity;
      return `
        <div class="order-item">
          <img src="${item.image}" alt="${item.product_name}" onerror="this.src='images/placeholder.png'"/>
          <div class="order-item-info">
            <h4>${item.product_name}</h4>
            <p class="meta">Qty: ${item.quantity}</p>
            <p class="item-price">₹${(item.price * item.quantity).toFixed(2)}</p>
          </div>
        </div>`;
    }).join('');

    const country = addr.country || 'India';
    const shipAmt = country === 'India' ? 0 : (shippingRates[country] || shippingRates['default']);
    const total = subtotal + shipAmt;
    localStorage.setItem('cart_total', total.toFixed(2));

    const shipHTML = shipAmt === 0
      ? `<span class="free-ship">Free</span>`
      : `<span class="paid-ship">₹${shipAmt}</span>`;

    const addrLine = [
      addr.name,
      addr.mobile ? '+91 ' + addr.mobile : '',
      addr.address1,
      addr.address2,
      addr.city + (addr.state ? ', ' + addr.state : ''),
      addr.pincode,
      addr.country
    ].filter(Boolean).join('<br>');

    container.innerHTML = `
      <div class="section-box">
        <div class="section-head">
          <h3>Items (${data.cart.length})</h3>
          <a onclick="window.location.href='cart.html'">Edit</a>
        </div>
        ${itemsHTML}
      </div>

      <div class="section-box">
        <div class="section-head">
          <h3>Shipping Address</h3>
          <a onclick="window.location.href='address.html'">Edit</a>
        </div>
        <div class="address-detail">${addrLine}</div>
      </div>

      <div class="section-box">
        <div class="section-head"><h3>Price Details</h3></div>
        <div class="price-row"><span>Subtotal</span><span>₹${subtotal.toFixed(2)}</span></div>
        <div class="price-row"><span>Shipping</span>${shipHTML}</div>
        <div class="price-row total"><span>Total</span><span>₹${total.toFixed(2)}</span></div>
      </div>

      <button class="place-order-btn" onclick="window.location.href='checkout.html'">Proceed to Payment →</button>
      <a class="back-link" onclick="history.back()">← Go back</a>
    `;
  }

  loadSummary();
</script>
<script src="js/cookies.js"></script>
<script src="js/footer.js"></script>
</body>
</html>
