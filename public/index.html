<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  const collections = [
    { name: "Aesthetic", ids: [37,1,9,19,32,33,46,31,45,22,4,40,53,59,42,17,10,14,44,62,47,71,83,87,89] },
    { name: "No Filter", ids: [35,36,49,51,16,57,95,98] },
    { name: "Pretty", ids: [3,38,39,48,63,56,12,18,54,61,72,76,78,79,82,85,88,94] },
    { name: "Black", ids: [5,29,30,58,50,20,21,43,68,69,96] },
    { name: "Harry Potter", ids: [7,41,65,66] },
    { name: "BTS", ids: [2,6,8,11,34,60] },
    { name: "Boys", ids: [26,27,23,67,73,74,75,77,80,86,91,97] },
    { name: "Classy", ids: [13,24,64,15,25,28,55,70,81,84,90,92,93] },
  ];

  const carousel = document.getElementById('collection-carousel');
  // render twice for seamless infinite loop
  [1, 2].forEach(() => {
    collections.forEach(col => {
      const a = document.createElement('a');
      a.className = 'carousel-card';
      a.href = `collection.html?name=${encodeURIComponent(col.name)}&ids=${col.ids.join(',')}`;
      a.textContent = col.name;
      carousel.appendChild(a);
    });
  });
</script>
</body>
