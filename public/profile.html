<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile - StyleVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    .profile-page {
      max-width: 480px;
      margin: 70px auto;
      padding: 0 20px 80px;
    }
    .profile-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .profile-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dk) 100%);
      padding: 40px 30px 30px;
      text-align: center;
      position: relative;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 14px;
      color: #fff;
    }
    .profile-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 4px;
    }
    .profile-header p {
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
    }
    .profile-body {
      padding: 28px 30px;
    }
    .profile-field {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .profile-field:last-of-type { border-bottom: none; }
    .profile-field-icon {
      width: 38px;
      height: 38px;
      background: #fdf5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .profile-field-info label {
      display: block;
      font-size: 0.75rem;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .profile-field-info span {
      font-size: 0.97rem;
      color: var(--text);
      font-weight: 500;
    }
    .profile-actions {
      padding: 0 30px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-orders {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-align: center;
      text-decoration: none;
      display: block;
    }
    .btn-orders:hover { background: var(--primary-dk); }
    .btn-logout {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #c0392b;
      border: 1.5px solid #e8b4b0;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: #fff5f5; border-color: #c0392b; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.png" alt="StyleVault"/><span>StyleVault</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="customize.html">Customize ✦</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html" class="cart-icon">🛒 Cart <span id="cart-count">0</span></a>
    <a href="login.html" id="auth-link">Login</a>
  </div>
</nav>

<div class="profile-page">
  <div class="profile-card">
    <div class="profile-header">
      <div class="profile-avatar">👤</div>
      <h2 id="profile-name">Loading...</h2>
      <p id="profile-email"></p>
    </div>
    <div class="profile-body">
      <div class="profile-field">
        <div class="profile-field-icon">✦</div>
        <div class="profile-field-info">
          <label>Full Name</label>
          <span id="field-name">—</span>
        </div>
      </div>
      <div class="profile-field">
        <div class="profile-field-icon">✉</div>
        <div class="profile-field-info">
          <label>Email Address</label>
          <span id="field-email">—</span>
        </div>
      </div>
      <div class="profile-field">
        <div class="profile-field-icon">🛍</div>
        <div class="profile-field-info">
          <label>Member Since</label>
          <span id="field-joined">—</span>
        </div>
      </div>
    </div>
    <div class="profile-actions">
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<footer></footer>
<script src="js/main.js"></script>
<script src="js/footer.js"></script>
<script src="js/cookies.js"></script>
<script>
  async function loadProfile() {
    const res = await fetch('/api/user/profile', { credentials: 'include' });
    if (res.status === 401) { window.location.href = 'login.html'; return; }
    const data = await res.json();
    if (!data.success) { window.location.href = 'login.html'; return; }
    const u = data.user;
    document.getElementById('profile-name').textContent = u.name;
    document.getElementById('profile-email').textContent = u.email;
    document.getElementById('field-name').textContent = u.name;
    document.getElementById('field-email').textContent = u.email;
    document.getElementById('field-joined').textContent = u.created_at
      ? new Date(u.created_at).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' })
      : '—';
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = 'index.html';
  }

  loadProfile();
</script>
</body>
</html>
