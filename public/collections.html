<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collections - StyleVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    .collections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 30px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 40px 60px;
    }
    .collection-card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      text-decoration: none;
    }
    .collection-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .preview-grid {
      position: relative;
      height: 200px;
      background: var(--primary);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      gap: 0;
      overflow: hidden;
    }
    .preview-grid img {
      width: 72px;
      height: 155px;
      object-fit: cover;
      border-radius: 18px;
      position: absolute;
      bottom: 18px;
      background: #fff;
      padding: 6px;
    }
    .preview-grid img:nth-child(1) {
      left: 50%;
      transform: translateX(-125%) rotate(-15deg) translateY(10px) scale(0.88);
      z-index: 1;
      box-shadow: 4px 12px 24px rgba(60,30,5,0.35);
      filter: brightness(0.82);
    }
    .preview-grid img:nth-child(2) {
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      height: 168px;
      width: 80px;
      box-shadow: 0 20px 40px rgba(60,30,5,0.38), 0 6px 12px rgba(60,30,5,0.22);
      filter: brightness(1);
    }
    .preview-grid img:nth-child(3) {
      left: 50%;
      transform: translateX(25%) rotate(15deg) translateY(10px) scale(0.88);
      z-index: 1;
      box-shadow: -4px 12px 24px rgba(60,30,5,0.35);
      filter: brightness(0.82);
    }
    .preview-grid img:nth-child(4) { display: none; }
    .collection-card .label {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .collection-card .label h3 { color: var(--text); font-size: 1rem; font-weight: 700; }
    .collection-card .label span { color: var(--primary); font-size: 0.9rem; font-weight: 600; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.png" alt="StyleVault"/><span>StyleVault</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="customize.html">Customize ✦</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html" class="cart-icon">🛒 Cart <span id="cart-count">0</span></a>
    <a href="login.html" id="auth-link">Login</a>
  </div>
</nav>

<h2 class="section-title">Shop by Collection</h2>

<div class="collections-grid" id="collections-grid"></div>

<footer><p>&copy; 2026 StyleVault. All rights reserved.</p></footer>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  const SKIP_CATEGORIES = ['Customized', 'Logo'];

  // Group products by category, skipping excluded folders
  const categoryMap = {};
  products.forEach(p => {
    if (SKIP_CATEGORIES.includes(p.category)) return;
    if (!categoryMap[p.category]) categoryMap[p.category] = [];
    categoryMap[p.category].push(p);
  });

  const grid = document.getElementById('collections-grid');

  Object.entries(categoryMap).forEach(([name, items]) => {
    const preview = items.slice(0, 4);
    const idsParam = items.map(p => p.id).join(',');
    const card = document.createElement('a');
    card.href = `collection.html?name=${encodeURIComponent(name)}&ids=${idsParam}`;
    card.className = 'collection-card';
    card.innerHTML = `
      <div class="preview-grid">
        ${preview.map(p => { const imgSrc = p.image.split('/').map((seg,i)=>i===0?seg:encodeURIComponent(seg)).join('/'); return `<img src="${imgSrc}" alt="${p.name}" onerror="this.src='images/placeholder.png'"/>`;}).join('')}
      </div>
      <div class="label">
        <h3>${name}</h3>
        <span>See More →</span>
      </div>
    `;
    grid.appendChild(card);
  });
</script>
<script src="js/cookies.js"></script>
<script src="js/footer.js"></script>
</body>
</html>
