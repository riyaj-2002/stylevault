<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product - StyleVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    .product-detail {
      max-width: 900px;
      margin: 50px auto;
      padding: 0 20px;
      display: flex;
      gap: 50px;
      align-items: flex-start;
    }
    .product-detail img {
      width: 360px; height: 360px;
      object-fit: contain;
      background: var(--bg);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .product-detail .details .model {
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
    }
    .product-detail .details h1 { font-size: 1.8rem; color: var(--text); margin-bottom: 10px; font-family: 'Playfair Display', serif; }
    .product-detail .details .price { font-size: 2rem; color: var(--primary); font-weight: 700; margin-bottom: 16px; }
    .product-detail .details .desc { color: #555; line-height: 1.7; font-size: 1rem; margin-bottom: 24px; }
    .variant-thumb:hover { border-color: var(--border); }
    .variant-thumb.active { border-color: var(--primary); }
    .phone-selector select, .phone-selector input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.95rem;
      color: var(--text); outline: none;
      margin-bottom: 14px; box-sizing: border-box;
      background: var(--card-bg);
    }
    .phone-selector label { display: block; font-weight: 600; color: var(--text); margin-bottom: 6px; font-size: 0.92rem; }
    .phone-selector select:focus, .phone-selector input:focus { border-color: var(--primary); }
    .material-selector label { display: block; font-weight: 600; color: var(--text); margin-bottom: 10px; font-size: 0.92rem; }
    .material-btn {
      padding: 12px 18px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--card-bg);
      color: #555;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      text-align: center;
      min-width: 100px;
    }
    .material-btn .mat-name { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .material-btn .mat-price { display: block; font-size: 0.95rem; font-weight: 700; color: var(--primary); }
    .material-btn:hover { border-color: var(--primary); background: var(--peach); }
    .material-btn.selected { background: var(--primary); border-color: var(--primary); }
    .material-btn.selected .mat-name { color: #fff; }
    .material-btn.selected .mat-price { color: var(--gold); }
    .price-display { font-size: 2rem; color: var(--primary); font-weight: 700; margin-bottom: 16px; transition: all 0.2s; }
    .qty-selector label { font-weight: 600; color: var(--text); font-size: 0.92rem; }
    .qty-selector button {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid var(--primary); background: var(--card-bg);
      font-size: 1.3rem; cursor: pointer; color: var(--primary);
      font-weight: 700; line-height: 1; transition: all 0.2s;
    }
    .qty-selector button:hover { background: var(--primary); color: #fff; }
    .btn-cart {
      padding: 13px 35px; border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer; font-weight: 600;
      background: var(--primary); color: #fff; transition: background 0.2s;
    }
    .btn-cart:hover { background: var(--primary-dk); }
    .back-link { display: inline-block; margin: 30px 20px 0; color: var(--primary); text-decoration: none; font-size: 0.92rem; font-weight: 500; }
    .back-link:hover { color: var(--primary-dk); }
    @media(max-width: 700px) {
      .product-detail { flex-direction: column; }
      .product-detail img { width: 100%; height: 280px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.png" alt="StyleVault"/><span>StyleVault</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="customize.html">Customize ✦</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html" class="cart-icon">🛒 Cart <span id="cart-count">0</span></a>
    <a href="login.html" id="auth-link">Login</a>
  </div>
</nav>

<a id="back-link" href="collections.html" class="back-link">← Back</a>

<div class="product-detail" id="product-detail"></div>

<footer><p>&copy; 2026 StyleVault. All rights reserved.</p></footer>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const product = products.find(p => p.id === id);

  // ── Pricing ──
  const isCustomize = product && product.category === 'Customized';
  const softPrice = isCustomize ? 249 : 249;
  const hardPrice = isCustomize ? 249 : 249;
  const glassPrice = 349;
  const defaultPrice = isCustomize ? 249 : (product ? product.price : 249);

  let selectedMaterial = '';
  let selectedPrice = defaultPrice;

  // ── Back link ──
  const backLink = document.getElementById('back-link');
  if (isCustomize) {
    backLink.href = 'customize-designs.html';
    backLink.textContent = '← Back to Customize';
  } else if (params.get('back') === 'collection' && params.get('name') && params.get('ids')) {
    backLink.href = `collection.html?name=${encodeURIComponent(params.get('name'))}&ids=${params.get('ids')}`;
    backLink.textContent = `← Back to ${params.get('name')}`;
  } else {
    backLink.href = 'collections.html';
    backLink.textContent = '← Back to Collections';
  }

  const brands = [
    'Apple', 'Samsung', 'Xiaomi', 'Redmi', 'POCO', 'OnePlus', 'Realme', 'Oppo',
    'Google', 'Motorola', 'Nothing', 'Nokia', 'Sony', 'LG', 'Infinix', 'Lenovo', 'Others'
  ];

  if (!product) {
    document.getElementById('product-detail').innerHTML = '<p style="padding:40px;color:#aaa">Product not found.</p>';
  } else {
    document.title = product.name + ' - StyleVault';

    const backParam = params.get('back') === 'collection'
      ? `back=collection&name=${encodeURIComponent(params.get('name'))}&ids=${params.get('ids')}`
      : '';

    document.getElementById('product-detail').innerHTML = `
      <img src="${product.image}" alt="${product.name}" onerror="this.src='images/placeholder.png'"/>
      <div class="details">
        <div class="model">${product.model}</div>
        <h1>${product.name}</h1>
        <div class="price-display" id="price-display">₹${defaultPrice}</div>
        <p class="desc">${product.description}</p>

        ${product.variants && product.variants.length > 1 ? `
        <div class="variants-section">
          <label style="font-weight:600;color:#1a1a2e;font-size:0.95rem;display:block;margin-bottom:8px">Other Colours</label>
          <div class="variants-row">
            ${product.variants.map(vid => {
              const v = products.find(p => p.id === vid);
              if (!v) return '';
              return `<div class="variant-thumb ${vid === product.id ? 'active' : ''}" onclick="window.location.href='product.html?id=${vid}&${backParam}'">
                <img src="${v.image}" alt="${v.name}" title="${v.name}"/>
              </div>`;
            }).join('')}
          </div>
        </div>` : ''}

        <div class="phone-selector">
          <label>Select Phone Brand</label>
          <select id="phone-brand" onchange="onBrandChange()">
            <option value="">-- Select Brand --</option>
            ${brands.map(b => `<option>${b}</option>`).join('')}
          </select>
          <div id="others-brand-box" style="display:none">
            <label>Enter Your Brand</label>
            <input type="text" id="custom-brand" placeholder="e.g. Vivo, Tecno..."/>
          </div>
          <label>Enter Phone Model</label>
          <input type="text" id="phone-model" placeholder="e.g. iPhone 15, Galaxy S24..."/>
        </div>

        <div class="material-selector">
          <label>Choose Case Material</label>
          <div class="material-options">
            <button type="button" class="material-btn" onclick="selectMaterial(this, 'Soft Case', ${softPrice})">
              <span class="mat-name">Soft Case</span>
              <span class="mat-price">₹${softPrice}</span>
            </button>
            <button type="button" class="material-btn" onclick="selectMaterial(this, 'Hard Case', ${hardPrice})">
              <span class="mat-name">Hard Case</span>
              <span class="mat-price">₹${hardPrice}</span>
            </button>
            <button type="button" class="material-btn" onclick="selectMaterial(this, 'Glass Case', ${glassPrice})">
              <span class="mat-name">Glass Case</span>
              <span class="mat-price">₹${glassPrice}</span>
            </button>
          </div>
        </div>

        <div class="qty-selector">
          <label>Quantity</label>
          <button onclick="changeQty(-1)">&#8722;</button>
          <span id="qty">1</span>
          <button onclick="changeQty(1)">&#43;</button>
        </div>

        <button class="btn-cart" onclick="addToCartQty()">🛒 Add to Cart</button>
      </div>
    `;
  }

  function onBrandChange() {
    const brand = document.getElementById('phone-brand').value;
    document.getElementById('others-brand-box').style.display = brand === 'Others' ? 'block' : 'none';
  }

  function selectMaterial(btn, material, price) {
    document.querySelectorAll('.material-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMaterial = material;
    selectedPrice = price;
    document.getElementById('price-display').textContent = '₹' + price;
  }

  function changeQty(val) {
    const el = document.getElementById('qty');
    el.textContent = Math.max(1, parseInt(el.textContent) + val);
  }

  async function addToCartQty() {
    const brand = document.getElementById('phone-brand').value;
    const customBrand = document.getElementById('custom-brand') ? document.getElementById('custom-brand').value.trim() : '';
    const model = document.getElementById('phone-model').value.trim();
    if (!brand) { alert('Please select your phone brand.'); return; }
    if (brand === 'Others' && !customBrand) { alert('Please enter your phone brand.'); return; }
    if (!model) { alert('Please enter your phone model.'); return; }
    if (!selectedMaterial) { alert('Please choose a case material.'); return; }
    const finalBrand = brand === 'Others' ? customBrand : brand;
    const qty = parseInt(document.getElementById('qty').textContent);
    const productName = `${product.name} (${selectedMaterial} - ${finalBrand} ${model})`;
    for (let i = 0; i < qty; i++) {
      await addToCart({
        product_id: product.id,
        product_name: productName,
        price: selectedPrice,
        image: product.image,
        phone_brand: finalBrand,
        phone_model: model,
        case_material: selectedMaterial
      });
    }
    // ── Save to customize_type2 if this is a customize product ───────────────
    if (product.category === 'Customized') {
      try {
        await fetch('/api/orders/customize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            type: '2',
            design_id: product.id,
            design_name: product.name,
            phone_brand: finalBrand,
            phone_model: model,
            case_material: selectedMaterial,
            price: selectedPrice
          })
        });
      } catch (e) { console.error('customize_type2 save failed:', e.message); }
    }
  }
</script>
<script src="js/cookies.js"></script>
<script src="js/footer.js"></script>
</body>
</html>
