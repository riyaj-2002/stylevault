<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - StyleVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    .cart-page {
      max-width: 520px;
      margin: 50px auto;
      padding: 0 20px 60px;
    }

    .cart-added-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.88rem;
      color: #3a2a4a;
      font-weight: 600;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e8e0f0;
    }
    .cart-added-bar span { display: flex; align-items: center; gap: 6px; }
    .cart-added-bar .close-x {
      cursor: pointer;
      font-size: 1.1rem;
      color: #aaa;
      text-decoration: none;
    }

    .order-item {
      display: flex;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid #e8e0f0;
    }
    .order-item img {
      width: 72px;
      height: 88px;
      object-fit: cover;
      border-radius: 10px;
      background: #f3eeff;
      flex-shrink: 0;
    }
    .order-item-info { flex: 1; }
    .order-item-info h4 { font-size: 0.95rem; color: #3a2a4a; margin-bottom: 6px; font-weight: 600; }
    .order-item-info .meta { font-size: 0.82rem; color: #888; margin-bottom: 3px; }
    .order-item-info .item-price { font-size: 0.92rem; color: #9575cd; font-weight: 700; margin-top: 6px; }
    .order-item .remove-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      align-self: flex-start;
    }
    .order-item .remove-btn:hover { color: #9575cd; }

    .order-summary-box {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 2px 12px rgba(80,40,120,0.08);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 10px;
    }
    .summary-row.total {
      font-size: 1rem;
      font-weight: 700;
      color: #3a2a4a;
      border-top: 1px solid #e8e0f0;
      padding-top: 12px;
      margin-top: 4px;
    }
    .shipping-note {
      font-size: 0.8rem;
      color: #4caf50;
      font-weight: 600;
    }
    .shipping-note.paid { color: #e53935; }

    .checkout-btn {
      width: 100%;
      padding: 14px;
      background: #3a2a4a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }
    .checkout-btn:hover { background: #9575cd; }

    .view-cart-btn {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #3a2a4a;
      border: 1.5px solid #d1c4e9;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: border-color 0.2s;
    }
    .view-cart-btn:hover { border-color: #9575cd; color: #9575cd; }

    .continue-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.82rem;
      color: #9575cd;
      text-decoration: underline;
    }

    .empty-cart { text-align: center; padding: 60px; color: #aaa; font-size: 1.1rem; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.png" alt="StyleVault"/><span>StyleVault</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="customize.html">Customize ✦</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html" class="cart-icon">🛒 Cart <span id="cart-count">0</span></a>
    <a href="login.html" id="auth-link">Login</a>
  </div>
</nav>

<div class="cart-page">
  <div id="cart-content"></div>
</div>

<footer><p>&copy; 2026 StyleVault. All rights reserved.</p></footer>

<script src="js/main.js"></script>
<script>
  // Shipping rates by country (INR). India = free.
  const shippingRates = {
    'India': 0,
    'default': 499
  };

  function getShipping() {
    const addr = JSON.parse(localStorage.getItem('delivery_address') || '{}');
    const country = addr.country || 'India';
    if (country === 'India') return { amount: 0, label: 'Free Shipping', paid: false };
    const rate = shippingRates[country] || shippingRates['default'];
    return { amount: rate, label: `₹${rate} (International)`, paid: true };
  }

  async function loadCart() {
    const res = await fetch('/api/cart', { credentials: 'include' });
    const container = document.getElementById('cart-content');

    // Session expired — redirect to login and come back
    if (res.status === 401) {
      container.innerHTML = `
        <div class="empty-cart">
          <p style="font-size:1.1rem;margin-bottom:12px">🔒 Please log in to view your cart</p>
          <a href="login.html?redirect=cart.html" style="background:var(--primary);color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.95rem">Login to see your items →</a>
        </div>`;
      return;
    }

    const data = await res.json();

    if (!data.success || data.cart.length === 0) {
      container.innerHTML = '<div class="empty-cart">Your cart is empty. <a href="collections.html">Shop now</a></div>';
      return;
    }

    let subtotal = 0;
    const itemsHTML = data.cart.map(item => {
      subtotal += item.price * item.quantity;
      return `
        <div class="order-item">
          <img src="${item.image}" alt="${item.product_name}" onerror="this.src='images/placeholder.png'"/>
          <div class="order-item-info">
            <h4>${item.product_name}</h4>
            <p class="meta">Qty: ${item.quantity}</p>
            <p class="item-price">₹${(item.price * item.quantity).toFixed(2)}</p>
          </div>
          <button class="remove-btn" onclick="removeItem(${item.product_id})">✕</button>
        </div>`;
    }).join('');

    const shipping = getShipping();
    const total = subtotal + shipping.amount;
    localStorage.setItem('cart_total', total.toFixed(2));

    container.innerHTML = `
      <div class="cart-added-bar">
        <span>✔ Item added to your cart</span>
        <a href="collections.html" class="close-x">✕</a>
      </div>

      ${itemsHTML}

      <div class="order-summary-box">
        <div class="summary-row">
          <span>Subtotal</span>
          <span>₹${subtotal.toFixed(2)}</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span class="shipping-note ${shipping.paid ? 'paid' : ''}">${shipping.label}</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>₹${total.toFixed(2)}</span>
        </div>
      </div>

      <button class="checkout-btn" onclick="window.location.href='address.html'">Check out</button>
      <a href="collections.html" class="continue-link">← Continue shopping</a>
    `;
  }

  async function removeItem(product_id) {
    await fetch('/api/cart/remove', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_id })
    });
    loadCart();
    updateCartCount();
  }

  loadCart();
</script>
<script src="js/cookies.js"></script>
<script src="js/footer.js"></script>
</body>
</html>
